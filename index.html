<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Economía | URJC</title>
    <style>
        /* Estilos generales para que parezca una App real */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background-color: #f4f6f9; color: #333; }
        
        /* Menú Lateral (Sidebar) */
        .sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 1.2em; border-bottom: 2px solid #34495e; padding-bottom: 10px; margin-bottom: 20px; }
        .menu-btn { background: #34495e; color: white; border: none; padding: 15px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; text-align: left; font-size: 1em; transition: 0.3s; }
        .menu-btn:hover, .menu-btn.active { background: #3498db; }

        /* Área Principal donde va el gráfico */
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 30px; overflow-y: auto; }
        .header { margin-bottom: 20px; }
        .header h1 { margin: 0; color: #2c3e50; }
        .header p { color: #7f8c8d; }

        /* Contenedor del Simulador (Controles + Canvas) */
        .simulator-container { display: flex; gap: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .controls { width: 300px; padding-right: 20px; border-right: 1px solid #eee; }
        .controls label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; }
        .controls input[type="range"] { width: 100%; margin-top: 5px; cursor: pointer; }
        canvas { flex: 1; background: #fafafa; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📊 Demos Microeconomía</h2>
        <button class="menu-btn active" onclick="cambiarDemo('impuestos')">1. Cuña e Incidencia Fiscal</button>
        <button class="menu-btn" onclick="cambiarDemo('monopolio')">2. Monopolio</button>
        <button class="menu-btn" onclick="cambiarDemo('externalidades')">3. Externalidades (Próximamente)</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="titulo-demo">Cuña Fiscal e Incidencia</h1>
            <p id="descripcion-demo">Modifica el impuesto y la elasticidad para ver quién soporta la carga fiscal.</p>
        </div>

<div class="simulator-container">
<div class="simulator-container">
            <div class="controls" id="panel-controles">
                
                <div id="controles-impuestos" class="grupo-controles">
                    <label>Impuesto (Cuña): <span id="val-impuesto">10</span> pts</label>
                    <input type="range" id="slide-impuesto" min="0" max="20" value="10">

                    <label>Inclinación Demanda (Elasticidad): <span id="val-demanda">Media</span></label>
                    <input type="range" id="slide-demanda" min="1" max="10" value="3">

                    <label>Inclinación Oferta (Elasticidad): <span id="val-oferta">Media</span></label>
                    <input type="range" id="slide-oferta" min="1" max="10" value="3">
                </div>

                <div id="controles-monopolio" class="grupo-controles" style="display: none;">
                    <label>Coste Marginal (CMg): <span id="val-cmg">15</span></label>
                    <input type="range" id="slide-cmg" min="5" max="30" value="15">
                    
                    <div style="margin-top: 20px; font-size: 0.9em; background: #fdfefe; padding: 10px; border: 1px solid #e1e8ed;">
                        <span style="color: #27ae60; font-weight: bold;">■ Beneficio Monopolista</span><br>
                        <span style="color: #f39c12; font-weight: bold;">■ Pérdida de Eficiencia (PIE)</span>
                    </div>
                </div>

            </div>

            <canvas id="lienzo" width="600" height="400"></canvas>
        </div>
    </div>

    <script>
const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        let demoActual = 'impuestos'; // Variable para saber qué demo estamos viendo

        // Elementos UI Impuestos
        const slideImpuesto = document.getElementById('slide-impuesto');
        const slideDemanda = document.getElementById('slide-demanda');
        const slideOferta = document.getElementById('slide-oferta');
        const valImpuesto = document.getElementById('val-impuesto');
        const valDemanda = document.getElementById('val-demanda');
        const valOferta = document.getElementById('val-oferta');

        // Elementos UI Monopolio
        const slideCmg = document.getElementById('slide-cmg');
        const valCmg = document.getElementById('val-cmg');

        // Textos del Header
        const tituloDemo = document.getElementById('titulo-demo');
        const descDemo = document.getElementById('descripcion-demo');

        // --- SISTEMA DE NAVEGACIÓN (SPA) ---
        function cambiarDemo(demo) {
            demoActual = demo;
            
            // Ocultar todos los controles
            document.getElementById('controles-impuestos').style.display = 'none';
            document.getElementById('controles-monopolio').style.display = 'none';
            
            // Actualizar botones del menú visualmente
            const botones = document.querySelectorAll('.menu-btn');
            botones.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Mostrar controles según la demo y cambiar títulos
            if (demo === 'impuestos') {
                document.getElementById('controles-impuestos').style.display = 'block';
                tituloDemo.innerText = "Cuña Fiscal e Incidencia";
                descDemo.innerText = "Modifica el impuesto y la elasticidad para ver quién soporta la carga fiscal.";
            } else if (demo === 'monopolio') {
                document.getElementById('controles-monopolio').style.display = 'block';
                tituloDemo.innerText = "Maximización en Monopolio";
                descDemo.innerText = "El monopolista produce donde IMg = CMg. Observa el beneficio y la pérdida irrecuperable.";
            } else {
                alert("Esta demo estará disponible pronto.");
                return;
            }
            dibujarGrafico();
        }

        // --- MOTOR DE DIBUJO ---
        function dibujarGrafico() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const ox = 60; const oy = 350; const scaleX = 15; const scaleY = 8;

            // Dibujar Ejes siempre
            ctx.beginPath(); ctx.moveTo(ox, 20); ctx.lineTo(ox, oy); ctx.lineTo(580, oy);
            ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2; ctx.stroke();
            ctx.font = '14px Arial'; ctx.fillStyle = '#2c3e50';
            ctx.fillText('Precio (P)', 10, 15); ctx.fillText('Cantidad (Q)', 500, oy + 20);

            // --- LÓGICA DEMO 1: IMPUESTOS (La que ya tenías) ---
            if (demoActual === 'impuestos') {
                let T = parseFloat(slideImpuesto.value);
                let md = parseFloat(slideDemanda.value);
                let ms = parseFloat(slideOferta.value);
                
                valImpuesto.innerText = T;
                valDemanda.innerText = md >= 8 ? "Inelástica" : (md <= 3 ? "Elástica" : "Media");
                valOferta.innerText = ms >= 8 ? "Inelástica" : (ms <= 3 ? "Elástica" : "Media");

                const Qe = 12; const Pe = 15;
                const a = Pe + md * Qe; const c = Pe - ms * Qe;
                let Qt = (a - c - T) / (md + ms);
                if (Qt < 0) Qt = 0;
                let P_pagado = a - md * Qt; let P_recibido = c + ms * Qt;

                if (T > 0 && Qt > 0) {
                    ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
                    ctx.fillRect(ox, oy - P_pagado * scaleY, Qt * scaleX, (P_pagado - Pe) * scaleY);
                    ctx.fillStyle = 'rgba(52, 152, 219, 0.3)';
                    ctx.fillRect(ox, oy - Pe * scaleY, Qt * scaleX, (Pe - P_recibido) * scaleY);
                }

                ctx.beginPath(); ctx.moveTo(ox + 2*scaleX, oy - (a - md*2)*scaleY); ctx.lineTo(ox + 25*scaleX, oy - (a - md*25)*scaleY); ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(ox + 2*scaleX, oy - (c + ms*2)*scaleY); ctx.lineTo(ox + 25*scaleX, oy - (c + ms*25)*scaleY); ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 3; ctx.stroke();
                
                if (T > 0) {
                    ctx.beginPath(); ctx.moveTo(ox + 2*scaleX, oy - (c + T + ms*2)*scaleY); ctx.lineTo(ox + 25*scaleX, oy - (c + T + ms*25)*scaleY); ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
                }
            } 
            
            // --- LÓGICA DEMO 2: MONOPOLIO (NUEVA) ---
            else if (demoActual === 'monopolio') {
                let CMg = parseFloat(slideCmg.value);
                valCmg.innerText = CMg;

                // Ecuaciones: D: P = 40 - Q  |  IMg: P = 40 - 2Q
                const a = 40; const b = 1;
                
                // Equilibrio Monopolio: IMg = CMg -> 40 - 2Q = CMg
                let Qm = (a - CMg) / (2 * b);
                let Pm = a - b * Qm; // Precio en la curva de demanda

                // Equilibrio Competencia Perfecta (para sacar la pérdida de eficiencia): D = CMg
                let Qc = (a - CMg) / b;

                // 1. Dibujar Áreas
                // Beneficio del Monopolista (Verde) -> (Pm - CMg) * Qm
                ctx.fillStyle = 'rgba(39, 174, 96, 0.3)';
                ctx.fillRect(ox, oy - Pm * scaleY, Qm * scaleX, (Pm - CMg) * scaleY);

                // Pérdida Irrecuperable de Eficiencia (Naranja)
                ctx.fillStyle = 'rgba(243, 156, 18, 0.4)';
                ctx.beginPath();
                ctx.moveTo(ox + Qm * scaleX, oy - Pm * scaleY); // Vértice superior
                ctx.lineTo(ox + Qc * scaleX, oy - CMg * scaleY); // Vértice derecho (D = CMg)
                ctx.lineTo(ox + Qm * scaleX, oy - CMg * scaleY); // Vértice inferior
                ctx.fill();

                // 2. Dibujar Curvas
                // Demanda (Azul)
                ctx.beginPath(); ctx.moveTo(ox, oy - a * scaleY); ctx.lineTo(ox + 40 * scaleX, oy); 
                ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = '#2980b9'; ctx.fillText('Demanda (D)', ox + 32 * scaleX, oy - 15);

                // Ingreso Marginal (Morado) -> Cae el doble de rápido
                ctx.beginPath(); ctx.moveTo(ox, oy - a * scaleY); ctx.lineTo(ox + 20 * scaleX, oy); 
                ctx.strokeStyle = '#8e44ad'; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = '#8e44ad'; ctx.fillText('IMg', ox + 15 * scaleX, oy - 15);

                // Coste Marginal (Rojo) -> Línea horizontal para simplificar visualmente
                ctx.beginPath(); ctx.moveTo(ox, oy - CMg * scaleY); ctx.lineTo(ox + 40 * scaleX, oy - CMg * scaleY); 
                ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = '#c0392b'; ctx.fillText('CMg', ox + 35 * scaleX, oy - CMg * scaleY - 10);

                // Líneas punteadas de referencia para Qm y Pm
                ctx.beginPath(); ctx.moveTo(ox + Qm * scaleX, oy); ctx.lineTo(ox + Qm * scaleX, oy - Pm * scaleY);
                ctx.moveTo(ox, oy - Pm * scaleY); ctx.lineTo(ox + Qm * scaleX, oy - Pm * scaleY);
                ctx.strokeStyle = '#7f8c8d'; ctx.setLineDash([5, 5]); ctx.lineWidth = 1; ctx.stroke(); ctx.setLineDash([]);

                // Puntos de equilibrio
                ctx.beginPath(); ctx.arc(ox + Qm * scaleX, oy - Pm * scaleY, 5, 0, 2 * Math.PI); ctx.fillStyle = '#2c3e50'; ctx.fill(); // Punto en Demanda
                ctx.beginPath(); ctx.arc(ox + Qm * scaleX, oy - CMg * scaleY, 5, 0, 2 * Math.PI); ctx.fillStyle = '#2c3e50'; ctx.fill(); // Punto en IMg = CMg
                
                // Etiquetas
                ctx.font = '12px Arial'; ctx.fillStyle = '#333';
                ctx.fillText(`Pm`, ox - 25, oy - Pm * scaleY + 5);
                ctx.fillText(`Qm`, ox + Qm * scaleX - 10, oy + 15);
            }
        }

        // Event Listeners (Escuchadores)
        slideImpuesto.addEventListener('input', dibujarGrafico);
        slideDemanda.addEventListener('input', dibujarGrafico);
        slideOferta.addEventListener('input', dibujarGrafico);
        slideCmg.addEventListener('input', dibujarGrafico);

        dibujarGrafico(); // Llamada inicial
    </script>
</body>
</html>
